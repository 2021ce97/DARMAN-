<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="DARMAN - Healthcare Platform for Afghanistan">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="DARMAN">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>DARMAN Healthcare</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F0FAF9; font-family: sans-serif; }
    #loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #E0F5F3 0%, #F0FAF9 100%);
    }
    .logo-wrap {
      width: 90px; height: 90px; background: #1AAB97;
      border-radius: 24px; display: flex; align-items: center;
      justify-content: center; margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(26,171,151,0.3);
    }
    .logo-wrap svg { width: 52px; height: 52px; fill: white; }
    .app-name { font-size: 28px; font-weight: 700; color: #1AAB97; letter-spacing: 3px; margin-bottom: 6px; }
    .app-sub { font-size: 13px; color: #6C7A76; margin-bottom: 32px; }
    .spinner { width: 36px; height: 36px; border: 3px solid #C8EDE9; border-top-color: #1AAB97; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/>
      </svg>
    </div>
    <div class="app-name">DARMAN</div>
    <div class="app-sub">Your Healthcare Companion</div>
    <div class="spinner"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var l = document.getElementById('loading');
      if (l) { l.style.opacity='0'; l.style.transition='opacity 0.4s'; setTimeout(function(){l.remove();},400); }
    });
    setTimeout(function() { var l=document.getElementById('loading'); if(l) l.remove(); }, 12000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
