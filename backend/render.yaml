services:
  - type: web
    name: darman-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: FIREBASE_PROJECT_ID
        value: mediconnect-4b155
      - key: FIREBASE_CLIENT_EMAIL
        value: firebase-adminsdk-fbsvc@mediconnect-4b155.iam.gserviceaccount.com
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        value: ""
      - key: GEMINI_API_KEY
        value: "AIzaSyCtueu8a8qNFYUeVO3HXaVLOCpOr-hiZIw"
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: HESABPAY_API_KEY
        sync: false
      - key: HESABPAY_MERCHANT_ID
        sync: false
      - key: HESABPAY_BASE_URL
        value: "https://api.hesabpay.af"
      - key: SMS_API_KEY
        sync: false
      - key: SMS_SENDER_ID
        value: "MediConnect"
      - key: JWT_SECRET
        generateValue: true
      - key: RATE_LIMIT_MAX
        value: 100
      - key: RATE_LIMIT_TIMEWINDOW
        value: 60000
